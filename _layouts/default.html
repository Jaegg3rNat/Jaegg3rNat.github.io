<button id="theme-toggle" style="
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background-color: transparent;

    color: cyan;
    border-radius: 8px;
    text-transform: uppercase;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    transition: 0.3s ease-in-out;
    box-shadow: 0 0 10px cyan;">
