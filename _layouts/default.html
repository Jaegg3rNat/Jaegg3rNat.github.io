<button id="theme-toggle" style="
    position: fixed; bottom: 15px; right: 15px; z-index: 1000;

    border: none;
    border-radius: 50%;
    width: clamp(40px, 5vw, 50px); height: clamp(40px, 5vw, 50px);
    font-size: clamp(22px, 5vw, 26px); /* Increased font size */
    line-height: 1; /* Ensures the emoji is centered */
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    transition: 0.3s;">
